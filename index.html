<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athena — Today's Mission</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800&family=Sora:wght@300;400;500;600&display=swap');
    :root{
      --bg:#f4f3ef; --bg2:#ffffff;
      --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
      --text:#0e0e0e; --muted:#666560; --dim:#999894;
      --cyan:#00c8b0; --cyan2:#00a896; --magenta:#e0287a; --greenA:#1db85a;
      --soft:#f7f6f2;
      --mono:'Share Tech Mono', monospace;
      --display:'Orbitron', sans-serif;
      --body:'Sora', sans-serif;
      --radius:6px; --radius-lg:10px;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family:var(--body); font-size:15px; color:var(--text); background:var(--bg); line-height:1.6;}
    body::before{content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.012) 2px,rgba(0,0,0,0.012) 4px); pointer-events:none;}

    /* ===== AUTH (top-right) ===== */
    .authbox{position:fixed; top:18px; right:20px; display:flex; align-items:center; gap:8px; z-index:5;}
    .authbtn{
      appearance:none; cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.08em;
      color:var(--text); background:var(--bg2); border:0.5px solid var(--border2); border-radius:4px;
      padding:8px 14px; display:flex; align-items:center; gap:8px; transition:border-color .18s, color .18s, background .18s;
    }
    .authbtn:hover{border-color:var(--cyan2); color:var(--cyan2);}
    .authbtn.primary{border-color:var(--cyan2); background:var(--cyan2); color:#fff; border-radius:18px; padding:9px 18px;}
    .authbtn.primary:hover{background:#00907f; color:#fff;}
    .authbtn.primary .gmark{background:#fff; border-radius:50%; padding:2px;}
    .gmark{width:14px; height:14px; flex:0 0 auto;}
    .authuser{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:11px; letter-spacing:.06em;
      background:var(--bg2); border:0.5px solid var(--border2); border-radius:4px; padding:5px 10px 5px 6px;}
    .authuser img{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);}
    .authuser .mail{color:var(--cyan2);}
    .authuser .initial{width:22px;height:22px;border-radius:50%;background:var(--cyan2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
    .authveil{position:fixed; inset:0; background:rgba(14,14,14,0.45); backdrop-filter:blur(2px); z-index:200; display:none; align-items:center; justify-content:center;}
    .authveil.open{display:flex;}
    .authmodal{width:min(420px, calc(100vw - 40px)); background:var(--bg2); border:0.5px solid var(--border2);
      border-radius:var(--radius-lg); box-shadow:0 30px 80px rgba(0,0,0,0.25); padding:28px 28px 24px; position:relative;}
    .authmodal .kick{font-family:var(--mono); font-size:10px; letter-spacing:.18em; color:var(--cyan2); margin-bottom:8px;}
    .authmodal h4{margin:0 0 6px; font-family:var(--display); font-size:16px; letter-spacing:.04em;}
    .authmodal p{margin:0 0 18px; font-size:13px; color:var(--muted);}
    .authmodal .gsi-slot{min-height:44px; display:flex; justify-content:center;}
    .authmodal .close{position:absolute; top:10px; right:12px; appearance:none; background:none; border:none; cursor:pointer; font-family:var(--mono); font-size:14px; color:var(--dim);}
    .demoauth{margin-top:14px; border-top:1px dashed var(--border2); padding-top:14px;}
    .demoauth label{display:block; font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--dim); margin-bottom:6px;}
    .demoauth input{width:100%; font-family:var(--mono); font-size:13px; padding:9px 10px; border:0.5px solid var(--border2); border-radius:4px; background:var(--soft); color:var(--text);}
    .demoauth button{margin-top:10px; width:100%; appearance:none; cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.1em; padding:10px; border-radius:4px; border:0.5px solid var(--cyan2); color:var(--cyan2); background:rgba(0,200,176,0.06);}
    .demoauth button:hover{background:rgba(0,200,176,0.14);}

    /* ===== APPS-GRID MENU + WAR ROOM SETTINGS ===== */
    .gridbtn{appearance:none; cursor:pointer; width:40px; height:40px; border:none; border-radius:50%;
      background:transparent; display:flex; align-items:center; justify-content:center; transition:background .15s;}
    .gridbtn:hover{background:rgba(0,0,0,0.06);}
    .gridbtn svg{width:18px; height:18px; fill:#5f6368;}
    .settings-pop{position:fixed; top:66px; right:16px; width:min(430px, calc(100vw - 24px));
      background:var(--bg2); border:0.5px solid var(--border); border-radius:16px;
      box-shadow:0 8px 30px rgba(0,0,0,0.18); padding:22px 22px 18px; z-index:150; display:none;
      max-height:calc(100vh - 90px); overflow-y:auto;}
    .settings-pop.open{display:block;}
    .settings-pop .kick{font-family:var(--mono); font-size:10px; letter-spacing:.18em; color:var(--cyan2); margin-bottom:6px;}
    .settings-pop h3{margin:0 0 2px; font-family:var(--display); font-size:18px; letter-spacing:.05em;}
    .settings-pop .sub{font-size:12.5px; color:var(--muted); margin:0 0 18px;}
    .set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px;}
    .set-row label{font-family:var(--mono); font-size:11px; letter-spacing:.12em; color:var(--dim);}
    .set-row .durwrap{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px; color:var(--muted);}
    .set-row input[type=number]{width:70px; font-family:var(--mono); font-size:13px; padding:7px 8px; text-align:center;
      border:0.5px solid var(--border2); border-radius:6px; background:var(--soft); color:var(--text);}
    table.scorecard{width:100%; border-collapse:collapse; font-size:12.5px;}
    table.scorecard th{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; color:var(--dim); text-align:left; padding:6px 8px; border-bottom:1px solid var(--border2);}
    table.scorecard td{padding:8px; border-bottom:0.5px solid var(--border); vertical-align:middle;}
    table.scorecard td.code{font-family:var(--mono); font-size:12px; color:var(--cyan2);}
    table.scorecard select{font-family:var(--mono); font-size:12px; padding:5px 6px; border:0.5px solid var(--border2); border-radius:5px; background:var(--soft); color:var(--text);}
    .set-note{font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:var(--dim); margin-top:12px;}

    /* ===== TODAY'S MISSION ===== */
    .mission-stage{min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:80px 20px 40px;}
    .mstage{max-width:560px; width:100%;}
    .wordmark{font-family:var(--body); font-weight:600; font-size:clamp(44px,8vw,68px); letter-spacing:-0.02em; line-height:1; margin-bottom:26px; user-select:none;}
    .wordmark span:nth-child(1){color:#4285F4;}
    .wordmark span:nth-child(2){color:#34A853;}
    .wordmark span:nth-child(3){color:#FBBC05;}
    .wordmark span:nth-child(4){color:#EA4335;}
    .wordmark span:nth-child(5){color:#4285F4;}
    .wordmark span:nth-child(6){color:#FBBC05;}
    .mtitle{font-family:var(--display); font-size:clamp(26px,4.5vw,40px); letter-spacing:.02em; margin:0 0 8px;}
    .msub{font-size:15px; color:var(--muted); margin:0 0 26px; line-height:1.6;}
    .mstats{display:flex; justify-content:center; gap:28px; margin:0 0 28px; flex-wrap:wrap;}
    .mstat .v{font-family:var(--display); font-size:24px;}
    .mstat .k{font-family:var(--mono); font-size:10px; letter-spacing:.14em; color:var(--dim);}
    .mbtn{appearance:none; cursor:pointer; font-family:var(--mono); font-size:13px; letter-spacing:.14em; padding:16px 34px; border-radius:6px; border:1px solid var(--cyan2); color:var(--cyan2); background:rgba(0,200,176,0.06); transition:background .18s;}
    .mbtn:hover{background:rgba(0,200,176,0.16);}
    .mnote{font-family:var(--mono); font-size:11px; color:var(--dim); margin-top:18px; letter-spacing:.06em;}
    .minstr{text-align:left; border:0.5px solid var(--border2); border-radius:var(--radius); padding:18px 20px; margin:0 0 24px; font-size:14px; line-height:1.75; white-space:pre-wrap; background:var(--soft);}
    .mrecovered{font-family:var(--display); font-size:clamp(40px,8vw,64px); color:var(--greenA); margin:6px 0;}
  </style>
</head>
<body>

<div class="authbox" id="authBox"></div>

<!-- ============ WAR ROOM SETTINGS ============ -->
<div class="settings-pop" id="settingsPop" role="dialog" aria-label="War Room settings">
  <div class="kick">ATHENA · SETTINGS</div>
  <h3>THE WAR ROOM</h3>
  <p class="sub">The campaign, its length, and the standard to hit.</p>
  <div class="set-row">
    <label for="setDuration">CAMPAIGN DURATION</label>
    <span class="durwrap"><input type="number" id="setDuration" min="1" max="730"/> DAYS</span>
  </div>
  <table class="scorecard" aria-label="Score card">
    <thead><tr><th>CODE</th><th>SUBJECT</th><th>GOAL</th></tr></thead>
    <tbody id="scorecardBody"></tbody>
  </table>
  <div class="set-note">SAVED AUTOMATICALLY · GOALS FEED THE DIGITAL TWIN'S GRADE TARGETS</div>
</div>

<main class="mission-stage" id="missionStage"></main>

<!-- ============ AUTH MODAL ============ -->
<div class="authveil" id="authVeil" role="dialog" aria-modal="true" aria-label="Sign in with Google">
  <div class="authmodal">
    <button class="close" id="authClose" aria-label="Close">✕</button>
    <div class="kick">ATHENA · SECURE ACCESS</div>
    <h4>SIGN IN WITH GOOGLE</h4>
    <p>Sign in with your Google account — new here? The same button creates your account.</p>
    <div class="gsi-slot" id="gsiSlot"></div>
    <div class="demoauth" id="demoAuth" style="display:none;">
      <label>DEV MODE — NO GOOGLE CLIENT ID CONFIGURED · ENTER GMAIL TO SIMULATE</label>
      <input type="email" id="demoEmail" placeholder="student@gmail.com" autocomplete="email"/>
      <button id="demoSignIn">CONTINUE (SIMULATED)</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ===== AUTH ===== */
const GOOGLE_CLIENT_ID = '';

const authBox  = document.getElementById('authBox');
const authVeil = document.getElementById('authVeil');
const gsiSlot  = document.getElementById('gsiSlot');
const demoAuth = document.getElementById('demoAuth');
let pendingAction = null;

function loadAuth(){try{return JSON.parse(localStorage.getItem('athena_auth'))||null}catch(e){return null}}
function saveAuth(u){try{u?localStorage.setItem('athena_auth',JSON.stringify(u)):localStorage.removeItem('athena_auth')}catch(e){}}
function isAuthed(){return !!loadAuth();}

const GLOGO = `<svg class="gmark" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

const GRIDBTN = `<button class="gridbtn" id="gridBtn" aria-label="Athena settings" aria-haspopup="dialog"><svg viewBox="0 0 24 24"><path d="M4 4h4v4H4zM10 4h4v4h-4zM16 4h4v4h-4zM4 10h4v4H4zM10 10h4v4h-4zM16 10h4v4h-4zM4 16h4v4H4zM10 16h4v4h-4zM16 16h4v4h-4z"/></svg></button>`;

function renderAuth(){
  const u = loadAuth();
  if(u){
    const avatar = u.picture
      ? `<img src="${u.picture}" alt="" referrerpolicy="no-referrer"/>`
      : `<span class="initial">${(u.name||u.email||'?').charAt(0).toUpperCase()}</span>`;
    authBox.innerHTML = GRIDBTN + `
      <span class="authuser">${avatar}<span class="mail">${u.email||u.name||''}</span></span>
      <button class="authbtn" id="signOutBtn">SIGN OUT</button>`;
    document.getElementById('signOutBtn').addEventListener('click',()=>{
      saveAuth(null);
      try{ if(window.google?.accounts?.id) google.accounts.id.disableAutoSelect(); }catch(e){}
      renderAuth(); refreshMission();
    });
  }else{
    authBox.innerHTML = GRIDBTN + `
      <button class="authbtn primary" id="signInBtn">${GLOGO}SIGN IN</button>`;
    document.getElementById('signInBtn').addEventListener('click',()=>openAuth());
  }
  document.getElementById('gridBtn').addEventListener('click',e=>{ e.stopPropagation(); toggleSettings(); });
}

/* ===== WAR ROOM SETTINGS ===== */
const DEFAULT_SETTINGS={
  durationDays:100,
  scorecard:[
    {code:'0580', subject:'IGCSE Mathematics (Extended)',      goal:'A*'},
    {code:'0625', subject:'IGCSE Physics (Extended)',          goal:'A*'},
    {code:'0620', subject:'IGCSE Chemistry (Extended)',        goal:'A*'},
    {code:'0478', subject:'IGCSE Computer Science (Extended)', goal:'A*'},
    {code:'0500', subject:'IGCSE English Language (Extended)', goal:'A*'}
  ]
};
const GRADES=['A*','A','B','C','D','E'];
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('athena_settings'));
    if(s && s.scorecard && s.durationDays) return s;
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
}
function saveSettings(s){ try{localStorage.setItem('athena_settings',JSON.stringify(s));}catch(e){} }

const settingsPop=document.getElementById('settingsPop');
function toggleSettings(){
  const opening=!settingsPop.classList.contains('open');
  if(opening) renderSettings();
  settingsPop.classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(settingsPop.classList.contains('open') && !settingsPop.contains(e.target)) settingsPop.classList.remove('open');
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') settingsPop.classList.remove('open'); });

function renderSettings(){
  const s=loadSettings();
  const dur=document.getElementById('setDuration');
  dur.value=s.durationDays;
  dur.onchange=()=>{ const v=parseInt(dur.value,10); if(v>0){ s.durationDays=v; saveSettings(s); } };
  const body=document.getElementById('scorecardBody');
  body.innerHTML=s.scorecard.map((r,i)=>`
    <tr>
      <td class="code">${r.code}</td>
      <td>${r.subject}</td>
      <td><select data-goal="${i}" aria-label="Goal grade for ${r.code}">
        ${GRADES.map(g=>`<option${g===r.goal?' selected':''}>${g}</option>`).join('')}
      </select></td>
    </tr>`).join('');
  body.querySelectorAll('select[data-goal]').forEach(sel=>{
    sel.addEventListener('change',()=>{
      s.scorecard[parseInt(sel.dataset.goal,10)].goal=sel.value;
      saveSettings(s);
    });
  });
}
function openAuth(){
  authVeil.classList.add('open');
  if(GOOGLE_CLIENT_ID && window.google?.accounts?.id){
    demoAuth.style.display='none';
    gsiSlot.innerHTML='';
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: onGoogleCredential });
    google.accounts.id.renderButton(gsiSlot, { theme:'outline', size:'large', text:'continue_with', width:340 });
  }else{
    gsiSlot.innerHTML = GOOGLE_CLIENT_ID
      ? `<span style="font-family:var(--mono);font-size:11px;color:var(--dim);">LOADING GOOGLE SIGN-IN…</span>` : '';
    demoAuth.style.display='block';
  }
}
function closeAuth(){ authVeil.classList.remove('open'); }
document.getElementById('authClose').addEventListener('click',()=>{ pendingAction=null; closeAuth(); });
authVeil.addEventListener('click',e=>{ if(e.target===authVeil){ pendingAction=null; closeAuth(); }});

function decodeJwtPayload(cred){
  try{
    const b64 = cred.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }catch(e){ return null; }
}
function onGoogleCredential(resp){
  const p = decodeJwtPayload(resp.credential);
  if(!p){ alert('Could not read Google credential.'); return; }
  completeSignIn({ email:p.email, name:p.name, picture:p.picture });
}
document.getElementById('demoSignIn').addEventListener('click',()=>{
  const email = document.getElementById('demoEmail').value.trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ alert('Enter a valid email address.'); return; }
  completeSignIn({ email, name:email.split('@')[0], picture:null, demo:true });
});
function completeSignIn(user){
  saveAuth(user); renderAuth(); closeAuth();
  refreshMission();
  if(pendingAction==='mission-upload'){ pendingAction=null; missionUpload(); }
}
function requireAuth(act){
  if(isAuthed()) return true;
  pendingAction=act; openAuth(); return false;
}

/* ===== TODAY'S MISSION · Recoverable Learning Loop ===== */
const API_BASE = (localStorage.getItem('athena_api') ?? 'http://localhost:8080');
const stage=document.getElementById('missionStage');
const loop={ get:()=>{try{return JSON.parse(localStorage.getItem('athena_loop'))||{}}catch(e){return{}}},
             set:(p)=>{const s={...loop.get(),...p}; localStorage.setItem('athena_loop',JSON.stringify(s)); return s;} };
let loopTimer=null;

const WORDMARK=`<div class="wordmark" aria-label="athena"><span>a</span><span>t</span><span>h</span><span>e</span><span>n</span><span>a</span></div>`;
function stageHTML(inner){ return `<div class="mstage">${WORDMARK}${inner}</div>`; }

/* Iteration 1 focuses on one paper; the code and a downloadable copy are fixed. */
const PAPER_CODE='0580_w25_22';
const PAPER_URL='https://pastpapers.papacambridge.com/download_file.php?files=https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/0580_w25_qp_22.pdf';

/* First time on 0580 = no evidence trail yet: no script with a 0580 paper code
   uploaded by this email. Signed-out users are always treated as first-time. */
async function isFirstTime0580(){
  const u=loadAuth();
  if(!u) return true;
  if(API_BASE && window.fetch){
    try{
      const list=await (await fetch(`${API_BASE}/api/scripts`)).json();
      return !list.some(s=>(s.paperCode||'').startsWith('0580') && s.uploadedBy===u.email);
    }catch(e){/* backend offline — fall through to local signal */}
  }
  return !loop.get().scriptId;
}

function renderMission(state, m, extra){
  if(state==='NO_MISSION'){
    isFirstTime0580().then(first=>{
      const signedIn=isAuthed();
      const paperLink=`<a href="${PAPER_URL}" target="_blank" rel="noopener" style="color:var(--cyan2);">this 0580 Math Paper 2 (Nov 2025)</a>`;
      const signInLink=`<a href="#" id="mSignIn" style="color:var(--cyan2);">Sign in</a>`;
      const sub = first
        ? (signedIn
            ? `Download ${paperLink}, work on it, upload answers and the Chief Examiner will find the fastest marks to win back.`
            : `${signInLink} or download ${paperLink}, work on it, upload answers and the Chief Examiner will find the fastest marks to win back.`)
        : `Upload yesterday's answers and the Chief Examiner will find the fastest marks to win back.`;
      stage.innerHTML=stageHTML(`
        <h1 class="mtitle">Today's Mission</h1>
        <p class="msub">${sub}</p>
        <button class="mbtn" id="mUpload">UPLOAD ANSWERS</button>
        <div class="mnote">${API_BASE?'':'BACKEND OFFLINE · SET athena_api IN LOCALSTORAGE'}</div>`);
      document.getElementById('mUpload').addEventListener('click',()=>{
        if(!requireAuth('mission-upload')) return;
        missionUpload();
      });
      document.getElementById('mSignIn')?.addEventListener('click',e=>{ e.preventDefault(); openAuth(); });
    });
  }
  if(state==='PREPARING'){
    stage.innerHTML=stageHTML(`
      <h1 class="mtitle">${extra||'Chief Examiner at work…'}</h1>
      <p class="msub">Reading the handwriting, marking against the official scheme, and hunting for recoverable marks.</p>
      <div class="mnote">THIS TAKES A FEW MINUTES · YOU CAN LEAVE AND COME BACK</div>`);
  }
  if(state==='PROPOSED'){
    stage.innerHTML=stageHTML(`
      <h1 class="mtitle">${m.title}</h1>
      <p class="msub">Pattern found: ${m.mistakeTag} · ${m.questionLabels.split(',').length} question(s)</p>
      <div class="mstats">
        <div class="mstat"><div class="v">+${m.estimatedRecovery}</div><div class="k">ESTIMATED RECOVERY</div></div>
        <div class="mstat"><div class="v">${m.estimatedMinutes}m</div><div class="k">ESTIMATED DURATION</div></div>
      </div>
      <button class="mbtn" id="mBegin">BEGIN MISSION</button>`);
    document.getElementById('mBegin').addEventListener('click',async ()=>{
      await fetch(`${API_BASE}/api/missions/${m.id}/accept`,{method:'POST'});
      refreshMission();
    });
  }
  if(state==='ACCEPTED'){
    stage.innerHTML=stageHTML(`
      <h1 class="mtitle">${m.title}</h1>
      <div class="minstr">${m.instructions.replace(/</g,'&lt;')}</div>
      <button class="mbtn" id="mReattempt">UPLOAD RE-ATTEMPT</button>
      <div class="mnote">DO Q${m.questionLabels} ON PAPER · PHOTOGRAPH OR SCAN TO ONE PDF</div>`);
    document.getElementById('mReattempt').addEventListener('click',()=>missionReattempt(m));
  }
  if(state==='VERIFYING'){
    stage.innerHTML=stageHTML(`
      <h1 class="mtitle">Verifying your re-attempt…</h1>
      <p class="msub">The Chief Examiner is re-marking Q${m?m.questionLabels:''} against the same scheme.</p>`);
  }
  if(state==='VERIFIED'){
    const r=m.recoveredMarks==null?0:m.recoveredMarks;
    stage.innerHTML=stageHTML(`
      <h1 class="mtitle">Mission complete</h1>
      <div class="mrecovered">+${r}</div>
      <p class="msub">Marks recovered on Q${m.questionLabels} · Digital Twin updated.<br/>${r>=m.estimatedRecovery?'Full recovery — outstanding.':r>0?'Real progress. The rest is tomorrow\'s mission.':'No change yet — the twin has logged this for a different approach tomorrow.'}</p>
      <button class="mbtn" id="mNext">START NEXT LOOP</button>`);
    document.getElementById('mNext').addEventListener('click',()=>{ loop.set({phase:null}); renderMission('NO_MISSION'); });
  }
}

async function refreshMission(){
  if(!(API_BASE&&window.fetch)){ renderMission('NO_MISSION'); return; }
  const st=loop.get();
  try{
    const r=await fetch(`${API_BASE}/api/mission/today`);
    const t=await r.json();
    if(t.state==='PROPOSED'||t.state==='ACCEPTED'){ renderMission(t.state,t.mission); return; }
    if(t.state==='VERIFIED'){
      if(st.phase==='verifying'||st.phase==='done'||!st.phase){ loop.set({phase:'done'}); renderMission('VERIFIED',t.mission); return; }
    }
    if(st.phase==='reading'||st.phase==='marking'){ renderMission('PREPARING'); pumpLoop(); return; }
    if(st.phase==='verifying'){ renderMission('VERIFYING',t.mission); pumpLoop(); return; }
    renderMission('NO_MISSION');
  }catch(e){ renderMission('NO_MISSION'); }
}

function pumpLoop(){
  clearInterval(loopTimer);
  loopTimer=setInterval(async ()=>{
    const st=loop.get();
    try{
      if(st.phase==='reading'&&st.scriptId){
        const s=await (await fetch(`${API_BASE}/api/scripts/${st.scriptId}`)).json();
        if(s.status==='READ'){
          loop.set({phase:'marking'});
          await fetch(`${API_BASE}/api/scripts/${st.scriptId}/mark`,{method:'POST'});
        }
        if(s.status==='FAILED'){ clearInterval(loopTimer); loop.set({phase:null}); renderMission('NO_MISSION'); alert('Reading failed: '+(s.errorMessage||'')); }
      }else if(st.phase==='marking'){
        const t=await (await fetch(`${API_BASE}/api/mission/today`)).json();
        if(t.state==='PROPOSED'){ clearInterval(loopTimer); loop.set({phase:'proposed'}); renderMission('PROPOSED',t.mission); }
      }else if(st.phase==='verifying'){
        const t=await (await fetch(`${API_BASE}/api/mission/today`)).json();
        if(t.state==='VERIFIED'){ clearInterval(loopTimer); loop.set({phase:'done'}); renderMission('VERIFIED',t.mission); }
      }else{ clearInterval(loopTimer); }
    }catch(e){/* keep pumping */}
  },4000);
}

function missionUpload(){
  const code=PAPER_CODE;
  const input=document.createElement('input');
  input.type='file'; input.accept='application/pdf,.pdf';
  input.addEventListener('change',async ()=>{
    const f=input.files&&input.files[0]; if(!f) return;
    renderMission('PREPARING',null,'Uploading evidence…');
    const fd=new FormData();
    fd.append('file',f); fd.append('paperCode',code);
    const u=loadAuth(); if(u&&u.email) fd.append('uploadedBy',u.email);
    try{
      const dto=await (await fetch(`${API_BASE}/api/scripts`,{method:'POST',body:fd})).json();
      await fetch(`${API_BASE}/api/scripts/${dto.id}/read`,{method:'POST'});
      loop.set({phase:'reading',scriptId:dto.id});
      renderMission('PREPARING');
      pumpLoop();
    }catch(e){ renderMission('NO_MISSION'); alert('Upload failed — is the backend running?'); }
  });
  input.click();
}
function missionReattempt(m){
  const input=document.createElement('input');
  input.type='file'; input.accept='application/pdf,.pdf';
  input.addEventListener('change',async ()=>{
    const f=input.files&&input.files[0]; if(!f) return;
    const fd=new FormData(); fd.append('file',f);
    try{
      await fetch(`${API_BASE}/api/missions/${m.id}/reattempt`,{method:'POST',body:fd});
      loop.set({phase:'verifying'});
      renderMission('VERIFYING',m);
      pumpLoop();
    }catch(e){ alert('Upload failed — is the backend running?'); }
  });
  input.click();
}

renderAuth();
refreshMission();
</script>
