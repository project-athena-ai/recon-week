spring:
  application:
    name: chief-examiner
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/athena}
    username: ${DB_USER:athena}
    password: ${DB_PASSWORD:athena}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 40MB
      max-request-size: 45MB

server:
  port: ${PORT:8080}

athena:
  storage-dir: ${STORAGE_DIR:./data/scripts}
  cors-origins: ${CORS_ORIGINS:http://localhost:8000,https://project-athena-ai.github.io}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: https://api.openai.com
    render-dpi: 160        # PDF page rasterisation resolution
    pages-per-batch: 4     # pages sent per vision request

logging:
  level:
    ai.athena: INFO
